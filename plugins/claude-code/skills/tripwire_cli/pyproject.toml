# Bundled copy of the tripwire CLI for the Claude Code plugin.
#
# PROVENANCE: generated from the canonical tripwire CLI source. Do not edit by
# hand; regenerate from the upstream package after any CLI change. When the CLI
# is published to PyPI this whole directory goes away and `bin/tripwire` calls
# `uvx tripwire-cli` directly.

[project]
name = "tripwire-cli"
version = "0.4.0"
description = "Tripwire canary client (bundled)"
requires-python = ">=3.12"
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
]

[project.scripts]
tripwire = "tripwire_cli.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tripwire_cli"]
