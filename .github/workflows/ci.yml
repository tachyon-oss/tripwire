name: CI

on:
  push:
  pull_request:

jobs:
  node:
    name: cli/node (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]
    defaults:
      run:
        working-directory: cli/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: cli/node/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  python:
    name: cli/python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli/python
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync --python 3.12
      - run: uv run pytest
